name: Notify on Workflow Completion

on:
  workflow_run:
    # List the display names (name: field) of workflows to receive notifications for.
    # GitHub does not support wildcards — add each workflow name explicitly.
    workflows:
      - "Deploy to AWS ECS"
      - "Destroy Infrastructure"
      - "Initialize Infrastructure"
      # - "Add more workflow names here"
    types:
      - completed

permissions:
  actions: read
  contents: read

jobs:
  notify:
    # Only notify for success or failure — skip cancelled/skipped runs
    if: >
      github.event.workflow_run.conclusion == 'success' ||
      github.event.workflow_run.conclusion == 'failure'
    uses: liatrio-forge/mumford-capstone/.github/workflows/slack-notify.yml@main
    with:
      workflow_name: ${{ github.event.workflow_run.name }}
      workflow_conclusion: ${{ github.event.workflow_run.conclusion }}
      run_id: ${{ github.event.workflow_run.id }}
      run_url: ${{ github.event.workflow_run.html_url }}
      branch: ${{ github.event.workflow_run.head_branch }}
      commit_sha: ${{ github.event.workflow_run.head_sha }}
      commit_message: ${{ github.event.workflow_run.head_commit.message }}
      actor: ${{ github.event.workflow_run.triggering_actor.login }}
    secrets: inherit