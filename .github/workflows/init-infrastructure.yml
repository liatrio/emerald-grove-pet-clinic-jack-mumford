name: Initialize Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name (e.g., staging)'
        required: true
        type: string
        default: staging

permissions:
  contents: read
  id-token: write

jobs:
  init-infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Validate environment input
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ -z "$ENV" ] || ! echo "$ENV" | grep -qE '^[a-z0-9-]{1,32}$'; then
            echo "Invalid environment name: '$ENV'"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Verify Terraform directory
        run: |
          if [ ! -d "terraform/${{ github.event.inputs.environment }}" ]; then
            echo "Directory terraform/${{ github.event.inputs.environment }} does not exist"
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Init

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform plan
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: terraform plan -out=tfplan

      - name: Terraform apply
        id: terraform-apply
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: terraform apply -auto-approve tfplan

      - name: Capture Terraform outputs
        id: tf-outputs
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: |
          echo "alb_dns=$(terraform output -raw alb_dns_name)" >> $GITHUB_OUTPUT
          echo "ecr_repo=$(terraform output -raw ecr_repository_name)" >> $GITHUB_OUTPUT
          echo "ecs_cluster=$(terraform output -raw ecs_cluster_name)" >> $GITHUB_OUTPUT
          echo "ecs_service=$(terraform output -raw ecs_service_name)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        id: login-ecr
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS \
            --password-stdin 277802554323.dkr.ecr.us-east-1.amazonaws.com
          echo "registry=277802554323.dkr.ecr.us-east-1.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Build and push initial Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/petclinic-${{ github.event.inputs.environment }}-repo-mumford:v1.0.0 \
            -t $ECR_REGISTRY/petclinic-${{ github.event.inputs.environment }}-repo-mumford:latest \
            --push \
            .

      - name: Wait for ECS service
        run: |
          aws ecs wait services-stable \
            --cluster petclinic-${{ github.event.inputs.environment }}-cluster-mumford \
            --services petclinic-${{ github.event.inputs.environment }}-service-mumford

      - name: Health check
        env:
          ALB_DNS: ${{ steps.tf-outputs.outputs.alb_dns }}
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              http://$ALB_DNS/actuator/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              HEALTH_STATUS=$(curl -s http://$ALB_DNS/actuator/health \
                | jq -r '.status' || echo "UNKNOWN")
              [ "$HEALTH_STATUS" = "UP" ] && exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Infrastructure summary
        if: always()
        run: |
          echo "Environment: ${{ github.event.inputs.environment }}"
          echo "Application URL: http://${{ steps.tf-outputs.outputs.alb_dns }}"
          echo "ECR: 277802554323.dkr.ecr.us-east-1.amazonaws.com/${{ steps.tf-outputs.outputs.ecr_repo }}"
          echo "ECS Cluster: ${{ steps.tf-outputs.outputs.ecs_cluster }}"
          echo "ECS Service: ${{ steps.tf-outputs.outputs.ecs_service }}"
