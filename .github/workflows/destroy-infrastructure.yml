name: Destroy Infrastructure

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment name (must match exactly, e.g., staging)'
        required: true
        type: string
      confirmation_word:
        description: 'Type "DESTROY" to confirm (case-sensitive)'
        required: true
        type: string
      acknowledge_deletion:
        description: 'I understand this will permanently delete all resources'
        required: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  destroy-infrastructure:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Validate inputs
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ -z "$ENV" ] || ! echo "$ENV" | grep -qE '^[a-z0-9-]{1,32}$'; then
            echo "Invalid environment name: '$ENV'"
            exit 1
          fi
          if [ "${{ github.event.inputs.confirmation_word }}" != "DESTROY" ]; then
            echo "Confirmation word must be 'DESTROY'"
            exit 1
          fi
          if [ "${{ github.event.inputs.acknowledge_deletion }}" != "true" ]; then
            echo "Must acknowledge resource deletion"
            exit 1
          fi

      - uses: actions/checkout@v4

      - name: Verify Terraform directory
        run: |
          if [ ! -d "terraform/${{ github.event.inputs.environment }}" ]; then
            echo "Directory terraform/${{ github.event.inputs.environment }} does not exist"
            exit 1
          fi

      - uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Destroy

      - name: Delete ECR images
        continue-on-error: true
        run: |
          REPO_NAME="petclinic-${{ github.event.inputs.environment }}-repo-mumford"
          IMAGE_IDS=$(aws ecr list-images \
            --repository-name $REPO_NAME \
            --query 'imageIds[*]' \
            --output json 2>/dev/null || echo "[]")
          if [ "$IMAGE_IDS" != "[]" ] && [ -n "$IMAGE_IDS" ]; then
            aws ecr batch-delete-image \
              --repository-name $REPO_NAME \
              --image-ids "$IMAGE_IDS" || true
          fi

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.0

      - name: Terraform init
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: terraform init

      - name: Terraform destroy
        working-directory: terraform/${{ github.event.inputs.environment }}
        run: terraform destroy -auto-approve

      - name: Verify ECS cluster deleted
        continue-on-error: true
        run: |
          aws ecs describe-clusters \
            --clusters petclinic-${{ github.event.inputs.environment }}-cluster-mumford \
            --query 'clusters[0].status' \
            --output text 2>&1

      - name: Destruction summary
        if: always()
        run: |
          echo "Environment destroyed: ${{ github.event.inputs.environment }}"
          echo "Status: ${{ job.status }}"
