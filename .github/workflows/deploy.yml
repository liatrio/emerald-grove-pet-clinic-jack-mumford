name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

concurrency:
  group: deploy-petclinic-staging-service-mumford
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Deploy

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: ./mvnw test

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        id: login-ecr
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS \
            --password-stdin 277802554323.dkr.ecr.us-east-1.amazonaws.com
          echo "registry=277802554323.dkr.ecr.us-east-1.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Determine image version
        id: version
        run: |
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            VERSION=$(git describe --exact-match --tags HEAD)
          else
            VERSION="sha-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/petclinic-staging-repo-mumford:$IMAGE_TAG \
            -t $ECR_REGISTRY/petclinic-staging-repo-mumford:latest \
            --push \
            .

      - name: Update ECS service
        id: ecs-update
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
        run: |
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster petclinic-staging-cluster-mumford \
            --services petclinic-staging-service-mumford \
            --query 'services[0].taskDefinition' \
            --output text)
          echo "current_task_def=$CURRENT_TASK_DEF" >> $GITHUB_OUTPUT

          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $CURRENT_TASK_DEF \
            --query 'taskDefinition' \
            | jq --arg IMAGE "$ECR_REGISTRY/petclinic-staging-repo-mumford:$IMAGE_TAG" \
              '.containerDefinitions[0].image = $IMAGE |
              del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(echo $NEW_TASK_DEF | \
            aws ecs register-task-definition --cli-input-json file:///dev/stdin \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster petclinic-staging-cluster-mumford \
            --service petclinic-staging-service-mumford \
            --task-definition $NEW_TASK_DEF_ARN \
            --no-cli-pager

      - name: Wait for ECS deployment
        run: |
          aws ecs wait services-stable \
            --cluster petclinic-staging-cluster-mumford \
            --services petclinic-staging-service-mumford

      - name: Get ALB DNS name
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names petclinic-staging-alb-mumford \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Health check
        env:
          ALB_DNS: ${{ steps.alb.outputs.alb_dns }}
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            HTTP_CODE=$(curl --connect-timeout 5 --max-time 10 -s -o /dev/null \
              -w "%{http_code}" http://$ALB_DNS/actuator/health || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              HEALTH_STATUS=$(curl --connect-timeout 5 --max-time 10 -s \
                http://$ALB_DNS/actuator/health | jq -r '.status' || echo "UNKNOWN")
              if [ "$HEALTH_STATUS" = "UP" ]; then
                exit 0
              fi
            fi
            sleep 10
          done
          exit 1

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e-tests/package-lock.json

      - name: Install E2E dependencies
        working-directory: e2e-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e-tests
        env:
          CI: true
          E2E_BASE_URL: http://${{ steps.alb.outputs.alb_dns }}
        run: npm test

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-tests/test-results/html-report
            e2e-tests/test-results/junit.xml

      - name: Rollback on failure
        if: failure()
        env:
          PREVIOUS_TASK_DEF: ${{ steps.ecs-update.outputs.current_task_def }}
        run: |
          aws ecs update-service \
            --cluster petclinic-staging-cluster-mumford \
            --service petclinic-staging-service-mumford \
            --task-definition $PREVIOUS_TASK_DEF \
            --force-new-deployment \
            --no-cli-pager
          aws ecs wait services-stable \
            --cluster petclinic-staging-cluster-mumford \
            --services petclinic-staging-service-mumford

      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Deployment successful: http://${{ steps.alb.outputs.alb_dns }}"
            echo "Image: ${{ steps.login-ecr.outputs.registry }}/petclinic-staging-repo-mumford:${{ steps.version.outputs.version }}"
          else
            echo "Deployment failed and was rolled back"
          fi
