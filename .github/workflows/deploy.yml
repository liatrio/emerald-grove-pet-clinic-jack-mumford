name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'pom.xml'
      - 'Dockerfile'
      - '.github/workflows/deploy.yml'
      - '.releaserc.json'

concurrency:
  group: deploy-petclinic-staging-service-mumford
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  issues: write
  pull-requests: write
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Run unit tests
        run: ./mvnw test -B

      - name: Semantic release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github

      - name: Log in to GitHub Container Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1
          role-session-name: GitHubActions-Deploy

      - uses: docker/setup-buildx-action@v3

      - name: Log in to Amazon ECR
        id: login-ecr
        run: |
          aws ecr get-login-password --region us-east-1 | \
          docker login --username AWS \
            --password-stdin 277802554323.dkr.ecr.us-east-1.amazonaws.com
          echo "registry=277802554323.dkr.ecr.us-east-1.amazonaws.com" >> $GITHUB_OUTPUT

      - name: Determine image version
        id: version
        run: |
          if [ "${{ steps.release.outputs.new_release_published }}" = "true" ]; then
            VERSION="v${{ steps.release.outputs.new_release_version }}"
          else
            VERSION="sha-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
          GHCR_IMAGE: ghcr.io/${{ github.repository }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/petclinic-staging-repo-mumford:$IMAGE_TAG \
            -t $ECR_REGISTRY/petclinic-staging-repo-mumford:latest \
            -t $GHCR_IMAGE:$IMAGE_TAG \
            -t $GHCR_IMAGE:latest \
            --push \
            .

      - name: Update ECS service
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.version.outputs.version }}
        run: |
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster petclinic-staging-cluster-mumford \
            --services petclinic-staging-service-mumford \
            --query 'services[0].taskDefinition' \
            --output text)

          NEW_TASK_DEF=$(aws ecs describe-task-definition \
            --task-definition $CURRENT_TASK_DEF \
            --query 'taskDefinition' \
            | jq --arg IMAGE "$ECR_REGISTRY/petclinic-staging-repo-mumford:$IMAGE_TAG" \
              '.containerDefinitions[0].image = $IMAGE |
              del(.taskDefinitionArn, .revision, .status, .requiresAttributes,
                  .compatibilities, .registeredAt, .registeredBy)')

          NEW_TASK_DEF_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --query 'taskDefinition.taskDefinitionArn' \
            --output text)

          aws ecs update-service \
            --cluster petclinic-staging-cluster-mumford \
            --service petclinic-staging-service-mumford \
            --task-definition $NEW_TASK_DEF_ARN \
            --health-check-grace-period-seconds 150 \
            --no-cli-pager

      - name: Wait for deployment to stabilize
        run: |
          aws ecs wait services-stable \
            --cluster petclinic-staging-cluster-mumford \
            --services petclinic-staging-service-mumford
