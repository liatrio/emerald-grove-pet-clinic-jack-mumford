name: Deploy to AWS ECS

on:
  push:
    branches:
      - main
  pull_request:

# Prevent overlapping deployments to the same environment
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

# Limit GITHUB_TOKEN permissions following principle of least privilege
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # Sub-task 1.3: Checkout repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Sub-task 1.2: Configure AWS credentials from GitHub Secrets
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Sub-task 1.4: Set up Java 17 for Maven builds
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: 'maven'

      # Sub-task 1.5: Run Maven unit tests before building Docker image
      - name: Run unit tests
        run: ./mvnw test

      # Sub-task 1.6: Set up Docker Buildx for multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Sub-task 1.7: Log in to Amazon ECR
      - name: Log in to Amazon ECR
        id: login-ecr
        run: |
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com
          echo "registry=${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com" >> $GITHUB_OUTPUT

      # Sub-task 1.8: Determine Docker image version tag
      - name: Determine image version
        id: version
        run: |
          # Check if current commit has a git tag (semantic version)
          if git describe --exact-match --tags HEAD 2>/dev/null; then
            VERSION=$(git describe --exact-match --tags HEAD)
          else
            # Fallback to short commit SHA
            VERSION="sha-${GITHUB_SHA::7}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      # Sub-task 1.9: Build and push Docker image to ECR
      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: petclinic-staging-repo-mumford
          IMAGE_TAG: ${{ steps.version.outputs.version }}
        run: |
          docker buildx build \
            --platform linux/amd64 \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:latest \
            --push \
            .
          echo "Image pushed: $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

      # Sub-task 1.10: Update ECS service to trigger new deployment
      - name: Update ECS service
        id: ecs-update
        run: |
          # Get current task definition
          CURRENT_TASK_DEF=$(aws ecs describe-services \
            --cluster petclinic-staging-cluster-mumford \
            --services petclinic-staging-service-mumford \
            --query 'services[0].taskDefinition' \
            --output text)

          echo "current_task_def=$CURRENT_TASK_DEF" >> $GITHUB_OUTPUT

          # Trigger new deployment with force-new-deployment flag
          aws ecs update-service \
            --cluster petclinic-staging-cluster-mumford \
            --service petclinic-staging-service-mumford \
            --force-new-deployment \
            --no-cli-pager

          echo "ECS service update triggered"

      # Sub-task 1.11: Wait for ECS deployment to stabilize
      - name: Wait for ECS deployment
        run: |
          echo "Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster petclinic-staging-cluster-mumford \
            --services petclinic-staging-service-mumford
          echo "ECS service is stable"

      # Sub-task 1.12: Retrieve ALB DNS name for testing
      - name: Get ALB DNS name
        id: alb
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers \
            --names petclinic-staging-alb-mumford \
            --query 'LoadBalancers[0].DNSName' \
            --output text)

          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "ALB DNS: $ALB_DNS"

      # Sub-task 1.13: Validate application health with retry logic
      - name: Health check validation
        env:
          ALB_DNS: ${{ steps.alb.outputs.alb_dns }}
        run: |
          echo "Waiting for application to be healthy..."
          MAX_ATTEMPTS=30
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Health check attempt $ATTEMPT of $MAX_ATTEMPTS..."

            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://$ALB_DNS/actuator/health || echo "000")

            if [ "$HTTP_CODE" = "200" ]; then
              HEALTH_STATUS=$(curl -s http://$ALB_DNS/actuator/health | jq -r '.status' || echo "UNKNOWN")
              if [ "$HEALTH_STATUS" = "UP" ]; then
                echo "✅ Application is healthy!"
                exit 0
              fi
            fi

            echo "Health check failed (HTTP $HTTP_CODE), retrying in 10 seconds..."
            sleep 10
          done

          echo "❌ Health check failed after $MAX_ATTEMPTS attempts"
          exit 1

      # Sub-task 1.14: Run E2E tests against deployed application
      - name: Set up Node.js for E2E tests
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: e2e-tests/package-lock.json

      - name: Install E2E test dependencies
        working-directory: e2e-tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e-tests
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: e2e-tests
        env:
          CI: true
          BASE_URL: http://${{ steps.alb.outputs.alb_dns }}
        run: npm test

      - name: Upload E2E test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            e2e-tests/test-results/html-report
            e2e-tests/test-results/junit.xml

      # Sub-task 1.15: Rollback on failure
      - name: Rollback on failure
        if: failure()
        env:
          PREVIOUS_TASK_DEF: ${{ steps.ecs-update.outputs.current_task_def }}
        run: |
          echo "⚠️  Deployment failed! Rolling back to previous task definition..."
          echo "Previous task definition: $PREVIOUS_TASK_DEF"

          # Update service to use previous task definition
          aws ecs update-service \
            --cluster petclinic-staging-cluster-mumford \
            --service petclinic-staging-service-mumford \
            --task-definition $PREVIOUS_TASK_DEF \
            --force-new-deployment \
            --no-cli-pager

          echo "Waiting for rollback to complete..."
          aws ecs wait services-stable \
            --cluster petclinic-staging-cluster-mumford \
            --services petclinic-staging-service-mumford

          echo "✅ Rollback completed successfully"

      # Sub-task 1.16: Deployment status summary
      - name: Deployment summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Deployment successful!"
            echo "Application URL: http://${{ steps.alb.outputs.alb_dns }}"
            echo "Image: ${{ steps.login-ecr.outputs.registry }}/petclinic-staging-repo-mumford:${{ steps.version.outputs.version }}"
          else
            echo "❌ Deployment failed and was rolled back"
          fi
