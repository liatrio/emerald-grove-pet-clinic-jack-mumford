<!DOCTYPE html>

<html xmlns:th="https://www.thymeleaf.org" th:replace="~{fragments/layout :: layout (~{::body},'owners')}">

<body>

  <h2 th:text="#{appointmentRequest}">Request Appointment</h2>

  <b th:text="#{pet}">Pet</b>
  <table class="table table-striped">
    <thead>
      <tr>
        <th th:text="#{name}">Name</th>
        <th th:text="#{birthDate}">Birth Date</th>
        <th th:text="#{type}">Type</th>
        <th th:text="#{owner}">Owner</th>
      </tr>
    </thead>
    <tr>
      <td th:text="${pet.name}"></td>
      <td th:text="${#temporals.format(pet.birthDate, 'yyyy-MM-dd')}"></td>
      <td th:text="${pet.type}"></td>
      <td th:text="${owner?.firstName + ' ' + owner?.lastName}"></td>
    </tr>
  </table>

  <form th:object="${visit}" class="form-horizontal" method="post">
    <div class="form-group has-feedback">

      <!-- Visit Type Select -->
      <div th:with="valid=${!#fields.hasErrors('visitType')}" th:class="${'form-group' + (valid ? '' : ' has-error')}"
        class="form-group">
        <label for="visitType" class="col-sm-2 control-label" th:text="#{visitType}">Visit Type</label>
        <div class="col-sm-10">
          <select id="visitType" class="form-control" th:field="*{visitType}">
            <option value="" th:text="#{selectVisitType}">Select Visit Type...</option>
            <option th:each="type : ${T(org.springframework.samples.petclinic.owner.VisitType).values()}"
                    th:value="${type}"
                    th:text="${type.displayName}">Type</option>
          </select>
          <span th:if="${valid}" class="fa fa-ok form-control-feedback" aria-hidden="true"></span>
          <th:block th:if="${!valid}">
            <span class="fa fa-remove form-control-feedback" aria-hidden="true"></span>
            <span class="help-inline" th:errors="*{visitType}" th:text="#{error}">Error</span>
          </th:block>
        </div>
      </div>

      <!-- Date Input -->
      <div th:with="valid=${!#fields.hasErrors('date')}" th:class="${'form-group' + (valid ? '' : ' has-error')}"
        class="form-group">
        <label for="date" class="col-sm-2 control-label" th:text="#{preferredDate}">Preferred Date</label>
        <div class="col-sm-10">
          <input class="form-control" type="date" th:field="*{date}"
                 th:min="${#temporals.format(#temporals.createToday(), 'yyyy-MM-dd')}" />
          <span th:if="${valid}" class="fa fa-ok form-control-feedback" aria-hidden="true"></span>
          <th:block th:if="${!valid}">
            <span class="fa fa-remove form-control-feedback" aria-hidden="true"></span>
            <span class="help-inline" th:errors="*{date}" th:text="#{error}">Error</span>
          </th:block>
        </div>
      </div>

      <!-- Description (Reason for Visit) -->
      <div th:with="valid=${!#fields.hasErrors('description')}" th:class="${'form-group' + (valid ? '' : ' has-error')}"
        class="form-group">
        <label for="description" class="col-sm-2 control-label" th:text="#{reasonForVisit}">Reason for Visit</label>
        <div class="col-sm-10">
          <textarea id="description" class="form-control" rows="3" th:field="*{description}"
                    th:placeholder="#{descriptionPlaceholder}"></textarea>
          <span th:if="${valid}" class="fa fa-ok form-control-feedback" aria-hidden="true"></span>
          <th:block th:if="${!valid}">
            <span class="fa fa-remove form-control-feedback" aria-hidden="true"></span>
            <span class="help-inline" th:errors="*{description}" th:text="#{error}">Error</span>
          </th:block>
        </div>
      </div>

      <!-- Request Notes (Optional) -->
      <div class="form-group">
        <label for="requestNotes" class="col-sm-2 control-label" th:text="#{additionalNotes}">Additional Notes</label>
        <div class="col-sm-10">
          <textarea id="requestNotes" class="form-control" rows="2" th:field="*{requestNotes}"
                    th:placeholder="#{requestNotesPlaceholder}"></textarea>
          <small class="form-text liatrio-muted" th:text="#{requestNotesHelp}">
            Any scheduling preferences or additional information
          </small>
        </div>
      </div>

    </div>

    <div class="form-group">
      <div class="col-sm-offset-2 col-sm-10">
        <button class="btn btn-primary" type="submit" th:text="#{submitRequest}">Submit Request</button>
        <a class="btn btn-secondary" th:href="@{'/owners/' + ${owner.id}}" th:text="#{cancel}">Cancel</a>
      </div>
    </div>
  </form>

  <br />
  <div class="alert alert-info" role="alert">
    <i class="fa fa-info-circle"></i>
    <span th:text="#{appointmentRequestInfo}">
      Your appointment request will be reviewed by our staff. We will contact you to confirm the appointment time.
    </span>
  </div>

</body>

</html>
