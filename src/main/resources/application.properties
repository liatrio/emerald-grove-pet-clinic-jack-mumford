# database init, supports mysql too
database=h2
spring.datasource.url=jdbc:h2:file:./data/petclinic;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
# Don't run schema/data scripts (would wipe data on restart)
spring.sql.init.mode=always
# Use Hibernate to create/update tables if they don't exist
spring.jpa.hibernate.ddl-auto=update

# Web
spring.thymeleaf.mode=HTML

# JPA
spring.jpa.open-in-view=false

# Internationalization
spring.messages.basename=messages/messages

# Actuator
management.endpoints.web.exposure.include=*

# Logging
logging.level.org.springframework=INFO
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.samples.petclinic=DEBUG
# logging.level.org.springframework.context.annotation=TRACE

# Maximum time static resources should be cached
spring.web.resources.cache.cachecontrol.max-age=12h
